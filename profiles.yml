Dngiang:
  role: Frontend Developer
  experience: 1 year
  stack: Vue.js, Vuex, Axios, Ant Design, SASS/SCSS.
  notes: |
    Workflow:
    Use the coding agent in code mode to read the entire codebase.
    Have the agent export a project overview file covering: libraries, tech stacks, packages, installed dependencies, known conflicts, configuration, versions, and environment setup.
    Use the agent to assist with deployment of the codebase.
    When developing components, describe each component in detail in the prompt (structure, behavior, styling, props, events).
    To fix bugs, paste terminal output directly into the agent as context.

    When context is lost (out-of-context):
    Start a new session.
    Re-prompt the full task description plus any new requirements at the beginning of the new session.

    Known limitations & guardrails:
    No image input: The company blocks image uploads. All UI descriptions must be written in text — describe layouts, spacing, colors, and component hierarchy verbally instead of using screenshots.
    Hard to trace code in responses: The agent's query and response formatting can look similar, making it difficult to distinguish. As a workaround, explicitly ask the agent to list all modified files at the end of its response with file paths, so changes can be traced file by file.

Lnmai2:
  role: Business Analyst
  experience: 2 years BA, requirements analysis
  stack: | 
    BABOK,
    Agile/Scrum,
    Design Thinking,
    BPMN,
    UML,
    User Stories,
    Jira,
    Draw.io,
    Stakeholder Management,
    Requirement Elicitation & Prioritization
  notes: |
    Tools: Microsoft Copilot (free plan, chatbot), draw.io for wireframes.
    Workflow:
    Phase 1: Requirements Received
      Receive requirements from the Product Owner via email or private messages.
      Copy the raw content into Microsoft Copilot with clear ordering instructions.
      Use Copilot to standardize and structure the raw requirements into a clean format.
    Phase 2: Requirements Research
      Prompt Copilot to brainstorm key points from the standardized requirements.
      Use Copilot to generate a list of business-related questions targeting stakeholders (Product Owner) and key users (HR staff).
      Conduct interviews with stakeholders and key users using the generated questions.
    Phase 3: Analysis
      Apply frameworks as appropriate: BPMN, Flowcharts, UML Diagrams, Gap Analysis (As-Is vs. To-Be).
      Input collected information (images + text) into Copilot to convert findings into categorized requirements: functional, non-functional, and business requirements.
      Prompt Copilot to detect conflicts among requirements, identify edge cases, and surface gaps between the current state and the target state.
    Phase 4: Design
      Create wireframes manually using draw.io (chosen over Figma for speed; no AI assistance in this step).
      Use Copilot to generate supporting design texts: screen flows, UI checklists, field definitions, and validation rules.
    Phase 5: Documentation
      Write a function list, then prompt Copilot to standardize the formatting and language.
      Derive use cases and user stories from the function list and process flows.
      Draft the SRS document; use Copilot to generate and expand SRS content based on the use cases and user stories.
    Phase 6: Demo & Training
      Conduct demos and training sessions manually. No AI involvement in this phase.

