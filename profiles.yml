Nvbinh3:
  role: Backend Developer
  experience: 2 years
  stack: |
      Java 11, Spring Boot 2.2.9, Spring Cloud (Hoxton.SR7) — Eureka, Zuul, Hystrix, Ribbon
      Spring Security + JWT
      Spring MVC + Swagger for API documentation
      MongoDB (primary), MySQL, MSSQL via JDBC/JPA/Hibernate
      Apache Kafka for messaging
      Redis for session/caching
      Docker Compose for orchestration
      Maven with multi-environment profiles (local, dev, stag, uat, prod, automations)
      RxJava, Reactor, Lombok, Jackson, Gson
      Logback for logging
      YAML-based configuration for Spring profiles and environment separation
  notes: |
      Workflow:
      Use the coding agent to read and understand the existing codebase.
      Define rules in the coding agent's system prompt to enforce project-specific coding standards and conventions.
      Use the coding agent to run the backend application and generate documentation on how to start and run it.
      Receive SRS from the BA, then prompt the coding agent with the SRS content and the established rules to develop new features.
      Use the coding agent to fix bugs encountered during development.

      Known limitations & guardrails:
      Context window: Each session typically handles only one query effectively due to limited context. Start a new session per task when needed.
      Skills file: The coding agent does not yet automatically read the skills file. Manually include relevant skills/patterns in the prompt when the agent needs project-specific knowledge.
      No prompt editing: Previous prompts in a session cannot be edited. If a prompt was wrong, restate the corrected version in a new message or session.
      Code mode caution: The agent modifies code directly without confirmation. Always use version control (Git) before prompting, so changes can be reviewed and reverted.

Ltlinh7:
  role: Manual QA Tester
  experience: 2 years
  stack: Manual testing, test case design, exploratory testing, Regression testing, Jira, Postman tool, MySQL, tool, SQL, Rest API, HTTP
  notes: |
      Tools: Microsoft Copilot (free plan, chatbot). All prompts written in Vietnamese.
      Prompting template: Persona + Input + Output. Always define a QA persona (e.g., You are an experienced QA tester…), provide the input documents, and specify the desired output format. If the response is unclear, ask follow-up questions before accepting.
      Workflow:
      Phase 1: Analysis
      Receive documentation from the BA: SRS, workflow diagrams.
      Input these documents into Copilot with the persona-based prompting template.
      Generate test cases from the documentation.
      Review the AI output and prompt follow-up questions for any unclear or incomplete areas.

      Phase 2: Write Test Cases (General → Detailed)
      Start from high-level test perspectives, then drill down into UI-level detail.
      Use Copilot to create a checklist that maps to use cases.
      Use user stories as additional input to generate more test cases.
      Approximately 80% of test case writing is AI-assisted; the remaining 20% is manual review, adjustment, and edge-case additions.
